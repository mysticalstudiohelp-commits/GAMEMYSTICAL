<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Breaker // System Hack</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --dim: #003b00; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { position: relative; border: 2px solid var(--neon); padding: 20px; box-shadow: 0 0 15px var(--dim); }
        .grid { display: grid; grid-template-columns: repeat(5, 60px); grid-gap: 10px; margin-top: 20px; }
        .node { width: 60px; height: 60px; border: 1px solid var(--neon); cursor: pointer; transition: all 0.2s; box-shadow: inset 0 0 5px var(--dim); }
        .node.active { background: var(--neon); box-shadow: 0 0 15px var(--neon); }
        #ui { text-align: center; margin-bottom: 10px; }
        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; cursor: pointer; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: var(--neon); color: var(--bg); }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 
            0% { transform: translate(0); } 
            20% { transform: translate(-2px, 2px); } 
            40% { transform: translate(-2px, -2px); } 
            60% { transform: translate(2px, 2px); } 
            80% { transform: translate(2px, -2px); } 
            100% { transform: translate(0); } 
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 class="glitch">SYSTEM_BREAKER v1.0</h1>
        <p>TASK: ALIGN ALL NODES TO [ACTIVE] STATE</p>
        <div>LEVEL: <span id="lvl">1</span> | MOVES: <span id="moves">0</span></div>
    </div>

    <div id="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <button class="btn" onclick="initGame()">Reset System</button>

    <script>
        const gridEl = document.getElementById('grid');
        const size = 5;
        let nodes = [];
        let moveCount = 0;
        let level = 1;

        // Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(freq, vol, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function initGame() {
            gridEl.innerHTML = '';
            nodes = [];
            moveCount = 0;
            document.getElementById('moves').innerText = moveCount;
            
            // Create Grid
            for (let i = 0; i < size * size; i++) {
                const div = document.createElement('div');
                div.className = 'node';
                div.dataset.index = i;
                div.onclick = () => handleNodeClick(i);
                gridEl.appendChild(div);
                nodes.push({ active: false, element: div });
            }

            // Scramble the grid (ensures solvability)
            for (let i = 0; i < 5 + level; i++) {
                const rand = Math.floor(Math.random() * (size * size));
                toggleNode(rand, true); // silent toggle
            }
        }

        function handleNodeClick(index) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            beep(400, 0.1, 0.1);
            toggleNode(index);
            
            // Toggle Neighbors
            const x = index % size;
            const y = Math.floor(index / size);

            if (x > 0) toggleNode(index - 1); // Left
            if (x < size - 1) toggleNode(index + 1); // Right
            if (y > 0) toggleNode(index - size); // Top
            if (y < size - 1) toggleNode(index + size); // Bottom

            moveCount++;
            document.getElementById('moves').innerText = moveCount;
            checkWin();
        }

        function toggleNode(index, silent = false) {
            nodes[index].active = !nodes[index].active;
            nodes[index].element.classList.toggle('active', nodes[index].active);
        }

        function checkWin() {
            const allActive = nodes.every(n => n.active);
            if (allActive) {
                beep(800, 0.1, 0.5);
                setTimeout(() => {
                    alert("ACCESS GRANTED. Proceding to next layer.");
                    level++;
                    document.getElementById('lvl').innerText = level;
                    initGame();
                }, 100);
            }
        }

        initGame();
    </script>
</body>
</html>
