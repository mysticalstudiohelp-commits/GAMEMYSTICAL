<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Game Hub</title> 
    
    <style>
        body { 
            background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .container { display: flex; gap: 20px; }
        
        .game-card {
            padding: 40px; background: #1e1e1e; border: 2px solid #333;
            border-radius: 15px; transition: all 0.3s ease; text-decoration: none; color: white;
            cursor: pointer; font-weight: bold; font-size: 1.2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .game-card:hover {
            transform: scale(1.1);
            background: #ff4757;
            border-color: #ff6b81;
            animation: none;
        }
    </style>
</head>
<body>

    <h1>Select Your Adventure</h1>
    <div class="container">
        <a href="#" class="game-card" onmouseover="playSound()">Cyber Racer</a>
        <a href="#" class="game-card" onmouseover="playSound()">Neon Quest</a>
        <a href="#" class="game-card" onmouseover="playSound()">Pixel Arena</a>
    </div>

    <audio id="hoverSound" src="hover.mp3"></audio>

    <script>
        function playSound() {
            let sound = document.getElementById("hoverSound");
            sound.currentTime = 0;
            sound.play().catch(() => {}); 
        }
    </script>
</body>
</html>
